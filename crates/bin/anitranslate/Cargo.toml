[package]
name = "anitranslate"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Local-first CLI for translating .ass/.srt subtitle files via LLM."

[lints]
workspace = true

[dependencies]
anitranslate-core = { path = "../../core" }
clap = { version = "4.5", features = ["derive", "wrap_help", "env"] }
tokio = { version = "1.41", features = ["macros", "rt-multi-thread", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
anyhow = "1.0"
serde_json = "1.0"
