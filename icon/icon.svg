<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bloom" cx="50%" cy="116%" r="85%">
      <stop offset="0%" stop-color="#e8b450" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#8f661f" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e1a636" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plate" cx="50%" cy="36%" r="85%">
      <stop offset="0%" stop-color="#17120b"/>
      <stop offset="100%" stop-color="#0b0805"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe6a8"/>
      <stop offset="50%" stop-color="#e1a636"/>
      <stop offset="100%" stop-color="#a8741f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- imperial deck plate (rounded, transparent corners) -->
  <rect x="56" y="56" width="912" height="912" rx="208" fill="url(#plate)"/>
  <rect x="56" y="56" width="912" height="912" rx="208" fill="url(#bloom)"/>
  <rect x="58" y="58" width="908" height="908" rx="206" fill="none" stroke="#e1a636" stroke-opacity="0.30" stroke-width="5"/>
  <rect x="68" y="68" width="888" height="888" rx="198" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <!-- the dragon seal (mark in the rail), gold + bloom, upper-centre -->
  <g transform="translate(512,446) scale(20) translate(-16,-16)" fill="#e1a636">
    <path d="M16 2c3 4 9 4 11 9-3-1-5 0-6 2 3 1 5 4 5 8-2-3-5-4-8-3 1 3 0 6-2 8-2-2-3-5-2-8-3-1-6 0-8 3 0-4 2-7 5-8-1-2-3-3-6-2 2-5 8-5 11-9z"/>
  </g>

  <!-- PG, tucked just under the dragon -->
  <text x="512" y="858" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-weight="700" font-size="340" letter-spacing="8" fill="url(#gold)">PG</text>
</svg>
