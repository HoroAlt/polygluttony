name: Release

# Build one installer per platform, rename to Polygluttony-<tag>-<os>.<ext>,
# and publish them to a (draft) GitHub Release.
# Triggers on a version tag push (e.g. v1.0.0), or manually with a tag input.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  release:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon only
            os: macos
            rust-target: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin --bundles app"
          - platform: ubuntu-22.04
            os: linux
            rust-target: ""
            tauri-args: "--bundles appimage"
          - platform: windows-latest
            os: windows
            rust-target: ""
            tauri-args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install

      - name: Build
        run: bun tauri build ${{ matrix.tauri-args }}

      - name: Stage artifact as Polygluttony-${{ env.TAG }}-${{ matrix.os }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          case "${{ matrix.os }}" in
            windows)
              src=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe | head -n1)
              cp "$src" "dist-release/Polygluttony-${TAG}-windows.exe"
              ;;
            linux)
              src=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)
              cp "$src" "dist-release/Polygluttony-${TAG}-linux.AppImage"
              ;;
            macos)
              app=$(ls -d src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app | head -n1)
              # Ad-hoc sign so macOS shows the normal Gatekeeper prompt instead of
              # "is damaged" (full notarization would need a paid Apple Developer ID).
              codesign --force --deep --sign - "$app"
              ditto -c -k --keepParent "$app" "dist-release/Polygluttony-${TAG}-macos.zip"
              ;;
          esac
          ls -la dist-release

      - name: Publish to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: Polygluttony ${{ env.TAG }}
          draft: true
          fail_on_unmatched_files: true
          files: dist-release/*
          body: |
            Download the build for your platform below.

            These builds are not signed with a paid developer certificate, so the OS
            warns on first launch:

            - **macOS** — the first launch is blocked. Open **System Settings →
              Privacy & Security**, scroll to the bottom, and click **Open Anyway**;
              then launch Polygluttony again and confirm. (Right-click → Open no longer
              works on recent macOS.)
            - **Windows** — on the SmartScreen prompt, click **More info → Run anyway**.
            - **Linux** — `chmod +x Polygluttony-*.AppImage`, then run it.
