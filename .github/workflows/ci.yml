name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Lint (clippy, warnings only)
        run: cargo clippy --workspace --all-targets
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test
        run: cargo test --workspace --verbose

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Audit dependencies
        run: cargo audit

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu -p anitranslate
          cargo build --release --target aarch64-unknown-linux-gnu -p anitranslate
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anitranslate-binaries
          path: |
            target/x86_64-unknown-linux-gnu/release/anitranslate
            target/aarch64-unknown-linux-gnu/release/anitranslate
